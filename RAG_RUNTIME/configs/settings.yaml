embedding:
  batch_size: 64
  # P14.7: bumped 512 → 1024. BGE-M3 нативно до 8192. Реальные документы у нас
  # редко >1000 токенов; 1024 закрывает >95% корпуса без обрезки.
  # Передаётся в build_index.py --max-seq-len. Сейчас не читается runtime'ом
  # (документация here, source of truth в env / CLI).
  max_seq_len: 1024
  query_prefix: "Represent this sentence for searching relevant passages: "
  normalize: true

retrieval:
  top_k: 20
  rrf_k: 60
  rrf_alpha: 0.7
  direction_boost: 0.1
  direction_confidence_threshold: 0.7

reranker:
  top_n: 8
  batch_size: 20
  max_length: 512
  # Heuristic boost multipliers
  boosts:
    auto_high_confidence: 1.3
    guided: 1.1
    order_rows_high: 1.15       # applied when order_rows >= 100
    doc_type_match: 1.2         # doc_type matches query intent
    direction_match: 1.25
    financial_modifier: 0.3     # penalize Безнал and discount products

generator:
  # P14: token limits x4 от P13 baseline. Реальные значения берутся из
  # app/config.py:Settings (env-overridable: MAX_TOKENS_HUMAN / _STRUCTURED / _DEAL).
  # Этот блок здесь только для документации — settings.py его не парсит.
  max_tokens_human: 4000
  max_tokens_structured: 4096
  max_tokens_deal: 8000
  temperature: 0.1
  top_p: 0.9

pricing:
  bundle_price_band_factor: 0.2   # ±20% for bundle price band
  analog_confidence_discount: 0.8  # discount when using analog pricing
  min_order_rows_for_guided: 10   # threshold for guided pricing
