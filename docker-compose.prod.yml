version: "3.9"

services:
  qdrant:
    image: qdrant/qdrant:v1.12.1
    container_name: labus_qdrant
    ports:
      - "127.0.0.1:6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__LOG_LEVEL: INFO
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: labus_api
    ports:
      - "127.0.0.1:8000:8000"
    env_file:
      - configs/.env
    environment:
      - QDRANT_URL=http://qdrant:6333
    volumes:
      - ./models:/app/models:ro
      - ./data:/app/data:ro
      - ./indexes:/app/indexes:ro
      - ./logs:/app/logs
      - ./app.db:/app/app.db
    depends_on:
      qdrant:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 10G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  qdrant_data:
