# Labus Sales RAG — nginx reverse proxy reference
# ================================================
# FastPanel manages nginx automatically via "Реверсивный прокси".
# This file is for REFERENCE ONLY — use it if you need to manually
# tweak the FastPanel-generated config for ai.labus.pro.
#
# Key settings to verify in FastPanel nginx config:
#   - proxy_pass http://127.0.0.1:8000
#   - proxy_read_timeout 120s  (LLM responses can take up to 60s)
#   - client_max_body_size 20M (for image uploads)

server {
    listen 80;
    server_name ai.labus.pro;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name ai.labus.pro;

    ssl_certificate /etc/letsencrypt/live/ai.labus.pro/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ai.labus.pro/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    client_max_body_size 20M;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}
