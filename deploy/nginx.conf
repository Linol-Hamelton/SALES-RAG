# Labus Sales RAG — nginx reverse proxy
# Copy to /etc/nginx/sites-available/rag and symlink to sites-enabled
# Replace rag.yourdomain.ru with your actual domain

server {
    listen 80;
    server_name rag.yourdomain.ru;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name rag.yourdomain.ru;

    ssl_certificate /etc/letsencrypt/live/rag.yourdomain.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rag.yourdomain.ru/privkey.pem;

    # SSL hardening
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    client_max_body_size 20M;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}
